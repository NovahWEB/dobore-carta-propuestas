<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Imagen temporal — foto de muestra">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4ECDC"/>
      <stop offset="1" stop-color="#E7D8BE"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#pbg)"/>
  <!-- marco punteado = ranura de foto pendiente -->
  <rect x="46" y="46" width="508" height="508" rx="26" fill="none"
        stroke="#A8622F" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="14 12"/>
  <!-- icono de imagen (montaña + sol), centrado y seguro para recortes circulares -->
  <g transform="translate(300,232)" fill="none" stroke="#8A4E23" stroke-width="9"
